name: 🚀 Akash AI Pro Gateway - CI/CD Pipeline

# ==============================================================================
# ARCHITECTURAL DECISION: The pipeline is split into distinct, parallelizable
# jobs (lint -> test -> build -> deploy) rather than one monolithic script.
# This gives fast feedback (lint failures surface in seconds, not after a
# full test+build cycle) and lets GitHub Actions parallelize independent
# stages across runners.
# ==============================================================================

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: 🔍 Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run flake8 (style & error checks)
        run: flake8 src --max-line-length=120 --extend-ignore=E203,W503

      - name: Run black (format check, non-mutating)
        run: black --check src

  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          ENVIRONMENT: staging
        run: pytest tests/ -v --cov=src --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: akash-ai-gateway-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          tags: akash-ai-gateway-dashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 🚢 Deploy (main branch only)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All checks passed on main."
          echo "🚀 Deployment step would trigger here (ECS/EKS/Fly.io/Render)."
          echo "   Wire this job to your cloud provider's deploy action, e.g.:"
          echo "   - aws-actions/amazon-ecs-deploy-task-definition"
          echo "   - azure/webapps-deploy"
          echo "   - google-github-actions/deploy-cloudrun"
